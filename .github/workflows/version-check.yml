name: Version check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the bump baseline (PR base branch or the pre-push
          # main tip) is always available to `git show`.
          fetch-depth: 0

      - name: VERSION is valid semver and matches Version.swift
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          echo "Version: $version"

          if ! echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error file=VERSION::VERSION must be X.Y.Z, got: $version"
            exit 1
          fi

          # Same check build.sh enforces locally: the compiled-in constant the
          # update checker compares against GitHub must match VERSION.
          if ! grep -q "current = \"$version\"" Sources/Lidless/Version.swift; then
            echo "::error file=Sources/Lidless/Version.swift::AppVersion.current does not match VERSION ($version)"
            exit 1
          fi

      - name: Version is bumped
        run: |
          version="$(tr -d '[:space:]' < VERSION)"

          # Baseline: PR base branch, or for direct pushes to main the tip
          # main was at before the push.
          if [ "${{ github.event_name }}" = "push" ]; then
            base_ref="${{ github.event.before }}"
            if ! git cat-file -e "$base_ref" 2>/dev/null; then
              echo "No baseline commit (new branch or force push); skipping bump check."
              exit 0
            fi
          else
            base_ref="origin/${{ github.base_ref }}"
          fi

          # No VERSION at the baseline (pre-1.0 history) — anything passes.
          if ! base="$(git show "$base_ref:VERSION" 2>/dev/null)"; then
            echo "No VERSION at baseline $base_ref; skipping bump check."
            exit 0
          fi
          base="$(echo "$base" | tr -d '[:space:]')"
          echo "baseline: $base, new: $version"

          if [ "$version" = "$base" ]; then
            echo "::error file=VERSION::Version not bumped — baseline is already $base. Bump VERSION and AppVersion.current."
            exit 1
          fi
          # sort -V puts the higher version last; the new version must win.
          if [ "$(printf '%s\n%s\n' "$base" "$version" | sort -V | tail -1)" != "$version" ]; then
            echo "::error file=VERSION::Version went backwards: $version < $base"
            exit 1
          fi
          echo "OK: $base -> $version"
